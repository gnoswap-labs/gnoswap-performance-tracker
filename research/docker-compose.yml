services:
  gno:
    build:
      context: .
      dockerfile: gno/Dockerfile
      args:
        GNOSWAP_REPO: ${GNOSWAP_REPO:-https://github.com/gnoswap-labs/gnoswap.git}
        GNOSWAP_REF: ${GNOSWAP_REF:-main}
    ports:
      - "46657:26657"
      - "48888:8888"
    env_file: .env
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://localhost:26657/status >/dev/null &&
          [ -f /tmp/gnoswap-ready ]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 180s
    environment:
      GNOSWAP_REF: ${GNOSWAP_REF:-main}
      GNOSWAP_REPO: ${GNOSWAP_REPO:-https://github.com/gnoswap-labs/gnoswap.git}
      GNO_CHAIN_ID: ${GNO_CHAIN_ID:-dev}
      GNO_GNOKEY_REMOTE: ${GNO_GNOKEY_REMOTE:-localhost:26657}
      GNO_REST: ${GNO_REST:-http://localhost:48888}
